<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0d0f14"/>
  
  <!-- Card body -->
  <rect x="96" y="160" width="320" height="210" rx="28" fill="#1e2130"/>
  
  <!-- Card stripe (top) -->
  <rect x="96" y="200" width="320" height="52" fill="#6c63ff" opacity="0.9"/>
  
  <!-- Chip -->
  <rect x="136" y="290" width="52" height="40" rx="8" fill="#6c63ff" opacity="0.7"/>
  <line x1="162" y1="290" x2="162" y2="330" stroke="#0d0f14" stroke-width="2"/>
  <line x1="136" y1="310" x2="188" y2="310" stroke="#0d0f14" stroke-width="2"/>
  
  <!-- Dots (card number placeholders) -->
  <circle cx="220" cy="315" r="6" fill="#ffffff" opacity="0.4"/>
  <circle cx="248" cy="315" r="6" fill="#ffffff" opacity="0.4"/>
  <circle cx="276" cy="315" r="6" fill="#ffffff" opacity="0.4"/>
  <circle cx="340" cy="315" r="6" fill="#6c63ff" opacity="0.8"/>
